<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kas Rohis - SYAHRUL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-lunas { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-cicil { background-color: #fef9c3; color: #854d0e; border: 1px solid #fef08a; }
        .status-belum { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    </style>
</head>
<body class="bg-slate-100 font-sans p-4 text-slate-800">

    <div class="max-w-4xl mx-auto">
        <header class="bg-white p-6 rounded-3xl shadow-md mb-6 border border-slate-200">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <div>
                    <h1 class="text-2xl font-black text-blue-600">KAS ROHIS ONLINE</h1>
                    <div id="dbStatus" class="text-[10px] font-bold text-amber-500 uppercase tracking-widest">Status: Menghubungkan...</div>
                </div>
                <div class="flex gap-2">
                    <button onclick="loginAdmin()" id="adminBtn" class="px-4 py-2 bg-slate-200 text-slate-700 rounded-2xl text-xs font-bold hover:bg-slate-300">ADMIN LOGIN</button>
                    <button onclick="openInput()" class="px-5 py-2 bg-blue-600 text-white rounded-2xl text-xs font-bold shadow-lg">+ BAYAR</button>
                </div>
            </div>
            
            <div class="mt-6 border-t pt-4">
                <label class="block text-[10px] font-black text-slate-400 mb-2 uppercase">Pilih Anggota</label>
                <select id="selectNama" onchange="loadTable()" class="w-full p-3 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none font-bold uppercase"></select>
            </div>
        </header>

        <div class="bg-white rounded-3xl shadow-md overflow-hidden border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b">
                        <tr>
                            <th class="p-4">Bulan</th>
                            <th class="p-4 text-right">Bayar</th>
                            <th class="p-4 text-right">Sisa</th>
                            <th class="p-4 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="isiTabel" class="divide-y divide-slate-50 text-sm"></tbody>
                </table>
            </div>
        </div>

        <footer class="mt-10 text-center text-[10px] text-slate-400 font-bold uppercase tracking-[0.3em]">
            Developed by <span class="text-blue-500">SYAHRUL</span>
        </footer>
    </div>

    <div id="modalBox" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 shadow-2xl">
            <h3 class="text-xl font-black mb-6 text-center italic">INPUT KAS</h3>
            <div class="space-y-4">
                <select id="pilihBulan" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold outline-none"></select>
                <input type="number" id="nominalUang" placeholder="Nominal Rp" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-black text-blue-600 outline-none">
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="closeModal()" class="flex-1 py-4 text-slate-400 font-bold text-xs uppercase">Batal</button>
                <button onclick="simpanData()" class="flex-1 py-4 bg-blue-600 text-white rounded-[20px] font-black text-xs">SIMPAN</button>
            </div>
        </div>
    </div>

    <script type="module" src="./script.js"></script>
</body>
</html>
